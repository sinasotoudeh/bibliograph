services:
  # ============================================
  # DATABASES
  # ============================================

  postgres:
    image: postgres:16
    container_name: bibliograph_postgres
    environment:
      POSTGRES_USER: bibliograph
      POSTGRES_PASSWORD: bibliograph_dev_2024
      POSTGRES_DB: bibliograph_db
      POSTGRES_INITDB_ARGS: "-E UTF8"
      LANG: en_US.utf8
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    networks:
      - bibliograph-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U bibliograph" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:latest
    container_name: bibliograph-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: bibliograph
      MONGO_INITDB_ROOT_PASSWORD: bibliograph_dev_2024
      MONGO_INITDB_DATABASE: bibliograph_analytics
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - bibliograph-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: bibliograph-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - bibliograph-network

  # ============================================
  # CACHE & MESSAGE BROKER
  # ============================================

  redis:
    image: redis:7-alpine
    container_name: bibliograph-redis
    command: redis-server --appendonly yes --requirepass bibliograph_dev_2024
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - bibliograph-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: bibliograph-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: bibliograph
      RABBITMQ_DEFAULT_PASS: bibliograph_dev_2024
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692" # Prometheus metrics
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - bibliograph-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # OBJECT STORAGE
  # ============================================

  minio:
    image: minio/minio:latest
    container_name: bibliograph-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: bibliograph
      MINIO_ROOT_PASSWORD: bibliograph_dev_2024
      MINIO_PROMETHEUS_AUTH_TYPE: public
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - bibliograph-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # MONITORING STACK
  # ============================================

  prometheus:
    image: prom/prometheus:latest
    container_name: bibliograph-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=10GB'
      - '--storage.tsdb.wal-compression'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    networks:
      - bibliograph-network
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy" ]
      interval: 10s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    container_name: bibliograph-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_INSTALL_PLUGINS=redis-datasource
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - bibliograph-network

  loki:
    image: grafana/loki:3.0.0
    container_name: bibliograph-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - bibliograph-network
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.0.0
    container_name: bibliograph-promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - bibliograph-network
    restart: unless-stopped

  # ============================================
  # MONITORING EXPORTERS
  # ============================================

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: bibliograph-redis-exporter
    environment:
      REDIS_ADDR: "redis://bibliograph-redis:6379"
      REDIS_PASSWORD: "bibliograph_dev_2024"
    ports:
      - "9121:9121"
    depends_on:
      - redis
    networks:
      - bibliograph-network
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: bibliograph-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://bibliograph:bibliograph_dev_2024@bibliograph_postgres:5432/bibliograph_db?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      - postgres
    networks:
      - bibliograph-network
    restart: unless-stopped

  mongodb-exporter:
    image: percona/mongodb_exporter:0.40.0
    container_name: bibliograph-mongodb-exporter
    environment:
      MONGODB_URI: "mongodb://bibliograph:bibliograph_dev_2024@bibliograph-mongo:27017"
    ports:
      - "9216:9216"
    depends_on:
      - mongo
    networks:
      - bibliograph-network
    restart: unless-stopped

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: bibliograph-blackbox-exporter
    ports:
      - "9115:9115"
    volumes:
      - ./monitoring/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    networks:
      - bibliograph-network
    restart: unless-stopped

  celery-exporter:
    image: danihodovic/celery-exporter:latest
    container_name: bibliograph-celery-exporter
    command: --broker-url=amqp://bibliograph:bibliograph_dev_2024@bibliograph-rabbitmq:5672/
    environment:
      - CELERY_BROKER_URL=amqp://bibliograph:bibliograph_dev_2024@bibliograph-rabbitmq:5672/
      - CELERY_RESULT_BACKEND=redis://:bibliograph_dev_2024@bibliograph-redis:6379/1
    ports:
      - "9808:9808"
    networks:
      - bibliograph-network
    restart: unless-stopped

  # ============================================
  # HOST & CONTAINER MONITORING (Optional)
  # ============================================

  node-exporter:
    image: prom/node-exporter:latest
    container_name: bibliograph-node-exporter
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro
    networks:
      - bibliograph-network
    pid: host

  cadvisor:
    image: zcube/cadvisor:latest # ← image غیررسمی اما پایدار از Docker Hub
    container_name: bibliograph-cadvisor
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - bibliograph-network
    privileged: true

# ============================================
# VOLUMES
# ============================================

volumes:
  postgres_data:
  mongo_data:
  mongo_config:
  elasticsearch_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  prometheus_data:
  grafana_data:

    # ============================================
    # NETWORKS
    # ============================================

networks:
  bibliograph-network:
    name: bibliograph-network
    driver: bridge
